<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PaddleDev</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <!-- 左侧面板：输入与控制 -->
    <div class="left">
      <div class="title">PaddleDev</div>
      
      <!-- 本地路径输入 -->
      <div class="field">
        <div class="label">文件夹路径</div>
        <input id="path" type="text" placeholder="输入包含图片的文件夹路径">
      </div>
      
      <!-- 文件夹选择 -->
      <div class="field">
        <div class="label">选择文件夹</div>
        <div class="fileRow">
          <input id="folder" type="file" webkitdirectory style="display:none;">
          <button id="browse" type="button">浏览…</button>
          <div class="fileName" id="folderName">未选择</div>
          <button id="clearFolder" type="button" disabled>清除</button>
        </div>
      </div>
      
      <!-- 操作按钮 -->
      <div class="actions">
        <button id="run">识别</button>
        <button id="copy" disabled>复制</button>
        <button id="preview" type="button" disabled>预览</button>
        <button id="history" type="button">历史记录</button>
      </div>
      
      <!-- 状态与日志 -->
      <div class="status" id="status">idle</div>
      <div class="log" id="log"></div>
      
      <!-- 第二步：文本分割（Coze 工作流） -->
      <div class="step2">
        <div class="label">第二步 分割文本</div>
        <div class="step2Row">
          <select id="subject">
            <option value="">请选择学科</option>
            <option value="语文">语文</option>
            <option value="数学">数学</option>
            <option value="英语">英语</option>
            <option value="物理">物理</option>
            <option value="历史">历史</option>
            <option value="生物">生物</option>
            <option value="地理">地理</option>
            <option value="化学">化学</option>
            <option value="政治">政治</option>
            <option value="俄语">俄语</option>
            <option value="西语">西语</option>
            <option value="西班牙">西班牙</option>
            <option value="德语">德语</option>
            <option value="法语">法语</option>
            <option value="日语">日语</option>
          </select>
          <button id="split" type="button" disabled>分割文本</button>
        </div>
      </div>

      <!-- 第三步：标记 -->
      <div class="step3">
        <div class="label">第三步 标记</div>
        <div class="step3Row">
          <input id="markText" type="text" placeholder="输入要标记的文字">
          <button id="mark" type="button">标记</button>
        </div>
      </div>
    </div>
    
    <!-- 右侧面板：识别结果展示 -->
    <div class="right">
      <div class="rightTitle">
        <div id="titleLabel">识别结果</div>
        <div class="meta" id="meta"></div>
      </div>
      <textarea id="output" spellcheck="false" placeholder="识别内容会显示在这里"></textarea>
    </div>
  </div>
  
  <!-- 历史记录模态框 -->
  <div id="historyModal" class="modal" style="display:none;">
    <div class="modalCard">
      <div class="modalHeader">
        <div>历史记录</div>
        <button id="historyClose" type="button">关闭</button>
      </div>
      <div class="modalBody">
        <div id="historyList" class="historyList"></div>
      </div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
