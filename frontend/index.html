<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MinerU Document Extractor</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="top-bar">
      <div class="logo">
        <span class="logo-mark">///</span>
        <h1>MINERU EXTRACTOR</h1>
      </div>
      <div class="header-meta">v2.0.0 // INDUSTRIAL BUILD</div>
    </header>

    <div class="main-content">
      <!-- Left Panel: Controls -->
      <aside class="panel controls-panel">
        <div class="panel-header">
          <h2>INPUT_CONTROLS</h2>
          <span class="status-indicator" id="statusIndicator">IDLE</span>
        </div>

        <div class="panel-body">
          <div class="control-group">
            <label class="block-label" for="path">[01] FOLDER_PATH</label>
            <input id="path" type="text" class="input-brutal" placeholder="Enter path to directory...">
          </div>

          <div class="control-group">
            <label class="block-label">[02] OR_SELECT_DIRECTORY</label>
            <div class="file-row">
              <input id="folder" type="file" webkitdirectory style="display:none;">
              <button id="browse" class="btn-brutal" type="button">BROWSE...</button>
              <div class="file-name" id="folderName">NO_DIRECTORY_SELECTED</div>
              <button id="clearFolder" class="btn-brutal btn-icon" type="button" disabled>X</button>
            </div>
          </div>

          <div class="control-group">
            <label class="block-label" for="ocrToken">[03] MINERU_API_TOKEN <span class="hint">(optional)</span></label>
            <input id="ocrToken" type="password" class="input-brutal" placeholder="Enter API Token...">
          </div>

          <div class="action-grid">
            <button id="run" class="btn-brutal btn-primary">RUN_EXTRACTION</button>
            <button id="copy" class="btn-brutal" disabled>COPY_OUTPUT</button>
            <button id="preview" class="btn-brutal" type="button" disabled>PREVIEW</button>
            <button id="history" class="btn-brutal" type="button">HISTORY</button>
          </div>

          <div class="divider"></div>

          <div class="control-group">
            <label class="block-label">[04] POST_PROCESS_SPLIT</label>
            <div class="split-row">
              <select id="subject" class="input-brutal">
                <option value="">SELECT_SUBJECT</option>
                <option value="语文">Chinese</option>
                <option value="数学">Math</option>
                <option value="英语">English</option>
                <option value="物理">Physics</option>
                <option value="历史">History</option>
                <option value="生物">Biology</option>
                <option value="地理">Geography</option>
                <option value="化学">Chemistry</option>
                <option value="政治">Politics</option>
              </select>
              <button id="split" class="btn-brutal" type="button" disabled>EXECUTE_SPLIT</button>
            </div>
          </div>

          <div class="log-container">
            <div class="log-header">SYSTEM_LOG</div>
            <div class="log-content" id="log"></div>
          </div>
        </div>
      </aside>

      <!-- Right Panel: Output -->
      <main class="panel output-panel">
        <div class="panel-header">
          <h2 id="titleLabel">EXTRACTION_OUTPUT</h2>
          <div class="meta-info" id="meta"></div>
        </div>
        <div class="panel-body output-body">
          <textarea id="output" class="output-area" spellcheck="false" placeholder="Awaiting extraction data..."></textarea>
        </div>
      </main>
    </div>
  </div>

  <!-- History Modal -->
  <div id="historyModal" class="modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h2>EXECUTION_HISTORY</h2>
        <button id="historyClose" class="btn-brutal btn-icon" type="button">X</button>
      </div>
      <div class="modal-body">
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
